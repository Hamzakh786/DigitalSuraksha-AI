<svg viewBox="0 0 1240 900" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk','Segoe UI',sans-serif">
  <defs>
    <style>
      .bg { fill: #0A0F1C; }
      .grid-line { stroke: #16213A; stroke-width: 1; }
      .layer-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #5C6B8A; letter-spacing: 1.5px; }
      .box { fill: #131C30; stroke: #223052; stroke-width: 1.3; rx: 10; }
      .box-title { font-size: 14px; font-weight: 700; fill: #E7ECF6; }
      .box-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; fill: #8998B8; }
      .endpoint-box { fill: #182338; stroke: #2C3C63; stroke-width: 1; rx: 8; }
      .endpoint-title { font-size: 12.5px; font-weight: 600; fill: #E7ECF6; }
      .endpoint-path { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; fill: #7AA2FF; }
      .step-box { fill: #101827; stroke: #223052; stroke-width: 1; rx: 6; }
      .step-text { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; fill: #8998B8; }
      .external-box { fill: #17131F; stroke: #FF7A33; stroke-width: 1.3; stroke-dasharray: 5 4; rx: 10; }
      .external-title { font-size: 14px; font-weight: 700; fill: #FFB98A; }
      .arrow { stroke: #3B4C77; stroke-width: 1.6; fill: none; marker-end: url(#arrowhead); }
      .arrow-grok { stroke: #FF7A33; stroke-width: 1.6; fill: none; marker-end: url(#arrowhead-orange); }
      .arrow-label { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; fill: #7891BC; }
      .tab-chip { fill: #1B2740; stroke: #2C3C63; stroke-width: 1; rx: 14; }
      .tab-chip-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #AFC4FF; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3B4C77" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#FF7A33" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1240" height="900" />
  <!-- faint scan grid, matches app background -->
  <g class="grid-line" opacity="0.5">
    <path d="M0,60 H1240 M0,320 H1240 M0,560 H1240 M0,860 H1240" />
  </g>

  <!-- Header -->
  <text x="40" y="38" font-size="20" font-weight="700" fill="#E7ECF6">Raksha Grid — System Architecture</text>
  <text x="40" y="58" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#5C6B8A">Digital Public Safety Intelligence · Prototype (3 features)</text>

  <!-- ===================== LAYER 1: CLIENT ===================== -->
  <text x="40" y="92" class="layer-label">01 · CLIENT LAYER — BROWSER</text>
  <rect x="40" y="102" width="1160" height="120" class="box" />
  <text x="64" y="130" class="box-title">Single-page frontend (no build step)</text>
  <text x="64" y="150" class="box-sub">index.html · style.css · app.js · config.js  →  fetch() calls to backend over HTTP/JSON</text>

  <rect x="64" y="168" width="150" height="36" class="tab-chip" />
  <text x="139" y="190" text-anchor="middle" class="tab-chip-text">01 · SCAM DETECTOR</text>

  <rect x="230" y="168" width="150" height="36" class="tab-chip" />
  <text x="305" y="190" text-anchor="middle" class="tab-chip-text">02 · CURRENCY SCAN</text>

  <rect x="396" y="168" width="150" height="36" class="tab-chip" />
  <text x="471" y="190" text-anchor="middle" class="tab-chip-text">03 · FRAUD SHIELD CHAT</text>

  <text x="600" y="190" class="box-sub">Tabs post to: /api/scam/analyze · /api/counterfeit/analyze (multipart) · /api/chat</text>

  <!-- Arrow client -> backend -->
  <path class="arrow" d="M620,222 V268" />
  <text x="632" y="250" class="arrow-label">HTTPS · JSON / multipart-form</text>

  <!-- ===================== LAYER 2: BACKEND ===================== -->
  <text x="40" y="292" class="layer-label">02 · APPLICATION LAYER — FLASK BACKEND (backend/app.py)</text>
  <rect x="40" y="302" width="1160" height="130" class="box" />
  <text x="64" y="328" class="box-title">Flask REST API</text>
  <text x="64" y="346" class="box-sub">Manual CORS · request validation · JSON responses · file-size limits · error handling</text>

  <rect x="64" y="362" width="330" height="52" class="endpoint-box" />
  <text x="80" y="382" class="endpoint-title">Scam Detector</text>
  <text x="80" y="398" class="endpoint-path">POST /api/scam/analyze</text>

  <rect x="418" y="362" width="330" height="52" class="endpoint-box" />
  <text x="434" y="382" class="endpoint-title">Counterfeit Currency Agent</text>
  <text x="434" y="398" class="endpoint-path">POST /api/counterfeit/analyze</text>

  <rect x="772" y="362" width="330" height="52" class="endpoint-box" />
  <text x="788" y="382" class="endpoint-title">Fraud Shield Chat</text>
  <text x="788" y="398" class="endpoint-path">POST /api/chat</text>

  <!-- Arrows down from endpoints to their processing modules -->
  <path class="arrow-grok" d="M229,414 V462" />
  <path class="arrow" d="M583,414 V462" />
  <path class="arrow-grok" d="M937,414 V462" />

  <!-- ===================== LAYER 3: PROCESSING MODULES ===================== -->
  <text x="40" y="486" class="layer-label">03 · PROCESSING MODULES</text>

  <!-- Grok client module (shared by scam + chat) -->
  <rect x="64" y="496" width="330" height="70" class="box" />
  <text x="80" y="518" class="box-title" font-size="13">grok_client.py</text>
  <text x="80" y="536" class="box-sub">System-prompted chat completion</text>
  <text x="80" y="550" class="box-sub">→ structured JSON risk analysis</text>

  <!-- CV module -->
  <rect x="418" y="496" width="330" height="220" class="box" />
  <text x="434" y="518" class="box-title" font-size="13">cv_analysis.py (OpenCV)</text>
  <text x="434" y="536" class="box-sub">5 transparent, weighted signals:</text>

  <rect x="434" y="546" width="298" height="26" class="step-box" />
  <text x="444" y="563" class="step-text">1. Print quality — Laplacian variance</text>
  <rect x="434" y="578" width="298" height="26" class="step-box" />
  <text x="444" y="595" class="step-text">2. Microprint density — FFT high-freq ratio</text>
  <rect x="434" y="610" width="298" height="26" class="step-box" />
  <text x="444" y="627" class="step-text">3. Security-thread signature — Hough lines</text>
  <rect x="434" y="642" width="298" height="26" class="step-box" />
  <text x="444" y="659" class="step-text">4. Colour consistency — HSV hue histogram</text>
  <rect x="434" y="674" width="298" height="26" class="step-box" />
  <text x="444" y="691" class="step-text">5. Edge density — Canny texture check</text>

  <!-- Grok client module (chat, reuses same module - draw second box referencing shared) -->
  <rect x="772" y="496" width="330" height="70" class="box" />
  <text x="788" y="518" class="box-title" font-size="13">grok_client.py (shared)</text>
  <text x="788" y="536" class="box-sub">Multi-turn chat, last 10 turns</text>
  <text x="788" y="550" class="box-sub">→ plain-language guidance + escalation</text>

  <!-- Arrows from the two Grok-backed modules down to the external Grok API box -->
  <path class="arrow-grok" d="M229,566 V620 C229,700 500,700 590,762" />
  <path class="arrow-grok" d="M937,566 V620 C937,700 700,700 660,762" />
  <text x="180" y="640" class="arrow-label">chat_completion()</text>
  <text x="900" y="640" class="arrow-label">chat_completion()</text>

  <!-- CV module note: no external call -->
  <text x="583" y="740" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#5C6B8A">cv_analysis.py runs fully offline — no external API call</text>

  <!-- ===================== LAYER 4: EXTERNAL ===================== -->
  <text x="40" y="756" class="layer-label">04 · EXTERNAL SERVICE</text>
  <rect x="380" y="766" width="480" height="94" class="external-box" />
  <text x="620" y="796" text-anchor="middle" class="external-title">xAI Grok API</text>
  <text x="620" y="816" text-anchor="middle" class="box-sub">https://api.x.ai/v1/chat/completions</text>
  <text x="620" y="834" text-anchor="middle" class="box-sub">Authenticated via GROK_API_KEY (backend/.env)</text>
  <text x="620" y="850" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9.5" fill="#7891BC">used by: Scam Detector + Fraud Shield Chat</text>

  <!-- Legend -->
  <g transform="translate(900,772)">
    <rect x="0" y="0" width="300" height="82" class="box" />
    <text x="16" y="20" class="box-sub" fill="#8998B8">Legend</text>
    <line x1="16" y1="36" x2="46" y2="36" class="arrow" />
    <text x="54" y="40" class="box-sub">internal call (no LLM)</text>
    <line x1="16" y1="58" x2="46" y2="58" class="arrow-grok" />
    <text x="54" y="62" class="box-sub">call to Grok LLM API</text>
  </g>
</svg>
